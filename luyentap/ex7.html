<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Contact Form</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .form-container {
            width: 300px;
            margin: auto;
            background: white;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        .message {
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>

<body>

<h1>Contact Us</h1>

<div class="form-container">
    <label>Name:</label>
    <input type="text" id="name">

    <label>Email:</label>
    <input type="email" id="email">

    <label>Message:</label>
    <textarea id="message"></textarea>

    <button onclick="submitForm()">Submit</button>

    <div id="result" class="message"></div>
</div>

<script>
    function submitForm() {
        let name = document.getElementById("name").value;
        let email = document.getElementById("email").value;
        let message = document.getElementById("message").value;
        let result = document.getElementById("result");

        if (name === "" || email === "" || message === "") {
            result.innerHTML = "Vui lòng điền đầy đủ thông tin!";
            result.className = "message error";
        } else {
            result.innerHTML = "Gửi thành công!";
            result.className = "message success";
        }
    }
</script>

</body>
</html>
